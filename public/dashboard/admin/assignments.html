<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment Management</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .assignment-form {
      background: #f9fafb;
      padding: 1.5rem;
      border-radius: 0.5rem;
      margin-bottom: 2rem;
    }
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .assignment-list {
      margin-top: 2rem;
    }
    .assignment-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .assignment-info {
      flex: 1;
    }
    .assignment-actions {
      display: flex;
      gap: 0.5rem;
    }
    .badge {
      background: #3b82f6;
      color: white;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.875rem;
      margin-left: 0.5rem;
    }
    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #6b7280;
    }
    .select-wrapper {
      position: relative;
    }
    select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      background: white;
      font-size: 1rem;
    }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .filter-section {
      background: #f3f4f6;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }
    .filter-row {
      display: flex;
      gap: 1rem;
      align-items: end;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <h2>Admin Panel</h2>
      <a href="/dashboard/admin/index.html">Dashboard</a>
      <a href="/dashboard/admin/requests.html">Requests</a>
      <a href="/dashboard/admin/announcements.html">Announcements</a>
      <a href="/dashboard/admin/notices.html">Notices</a>
      <a href="/dashboard/admin/lectures.html">Lectures</a>
      <a href="/dashboard/admin/attendance.html">Attendance</a>
      <a href="/dashboard/admin/assignments.html" class="active">Assignments</a>
      <a href="/dashboard/admin/chat.html">Chat</a>
    </aside>
    <main class="main-area">
      <div class="topbar">
        <div><strong class="js-user-name">Admin</strong> (<span class="js-user-role">admin</span>)</div>
        <button class="btn" id="logoutBtn">Logout</button>
      </div>
      <h1 class="page-title">Teacher-Student Assignments</h1>
      
      <div class="assignment-form">
        <h3>Create New Assignment</h3>
        <form id="assignmentForm">
          <div class="form-row">
            <div class="select-wrapper">
              <label for="teacherSelect">Teacher</label>
              <select id="teacherSelect" required>
                <option value="">Select Teacher</option>
              </select>
            </div>
            <div class="select-wrapper">
              <label for="studentSelect">Student</label>
              <select id="studentSelect" required>
                <option value="">Select Student</option>
              </select>
            </div>
            <div class="select-wrapper">
              <label for="subjectSelect">Subject</label>
              <select id="subjectSelect" required>
                <option value="">Select Subject</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn">Create Assignment</button>
        </form>
      </div>

      <div class="filter-section">
        <h3>Filter Assignments</h3>
        <div class="filter-row">
          <div class="select-wrapper">
            <label for="filterTeacher">Filter by Teacher</label>
            <select id="filterTeacher">
              <option value="">All Teachers</option>
            </select>
          </div>
          <div class="select-wrapper">
            <label for="filterStandard">Filter by Standard</label>
            <select id="filterStandard">
              <option value="">All Standards</option>
            </select>
          </div>
          <button class="btn" id="clearFilters">Clear Filters</button>
        </div>
      </div>

      <div class="assignment-list">
        <h3>Current Assignments</h3>
        <div id="assignmentsList">
          <div class="empty-state">Loading assignments...</div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/assignments.js"></script>
</body>
</html>
